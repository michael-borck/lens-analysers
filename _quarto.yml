project:
  type: website
  output-dir: _site
  # Explicit render list: the curated public pages. README.md is NOT rendered as
  # its own page — it is included into index.qmd so the landing page and the
  # GitHub repo readme stay a single source. docs/superpowers/ (internal plans +
  # specs) and docs/rendered/ (ad-hoc exports) are deliberately left out.
  render:
    - index.qmd
    - CONVENTIONS.md
    - ADDING-A-MEMBER.md
    - ANALYSER-FAMILY-UX-GOTCHAS.md
    - CANDIDATE-MEMBERS.md
    - docs/ASSESSMENT-MAP.md
    - docs/SIGNAL-CATALOGUE.md
    - docs/SIGNAL-CATALOGUE-PLAIN.md
    - docs/ASSESSMENT-LENS-SCOPING.md
    - docs/ROADMAP.md
    - docs/adr/0001-alignment-lives-in-assessment-lens.md

website:
  title: "The Analyser Family"
  description: >-
    Small, independent tools that each take a file and return structured JSON
    signals — one tool per content type, a shared contract so they compose.
  site-url: "https://michael-borck.github.io/lens-analysers/"
  repo-url: "https://github.com/michael-borck/lens-analysers"
  repo-actions: [source, issue]
  page-navigation: true
  search: true
  navbar:
    pinned: true
    left:
      - text: "Home"
        href: index.qmd
      - text: "The family"
        href: index.qmd#the-family
      - text: "Conventions"
        href: CONVENTIONS.md
      - text: "Add a member"
        href: ADDING-A-MEMBER.md
      - text: "UX gotchas"
        href: ANALYSER-FAMILY-UX-GOTCHAS.md
      - text: "Assessment"
        menu:
          - text: "Assessment map (Product/Process × Convergent/Divergent)"
            href: docs/ASSESSMENT-MAP.md
          - text: "Signal catalogue"
            href: docs/SIGNAL-CATALOGUE.md
          - text: "Signal catalogue (plain-language)"
            href: docs/SIGNAL-CATALOGUE-PLAIN.md
          - text: "assessment-lens scoping"
            href: docs/ASSESSMENT-LENS-SCOPING.md
      - text: "Candidates"
        href: CANDIDATE-MEMBERS.md
      - text: "Roadmap"
        href: docs/ROADMAP.md
    right:
      - icon: github
        href: "https://github.com/michael-borck/lens-analysers"
        aria-label: "GitHub"

format:
  html:
    theme:
      light: cosmo
      dark: darkly
    toc: true
    toc-depth: 3
    code-copy: true
    code-overflow: wrap
    grid:
      sidebar-width: 250px
      body-width: 900px
